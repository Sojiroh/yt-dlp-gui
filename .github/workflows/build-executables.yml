name: Build executables

permissions:
  contents: write

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  tag:
    name: Auto-tag from pyproject.toml
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      created: ${{ steps.check.outputs.created }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version and create tag if new
        id: check
        shell: bash
        run: |
          version=$(python3 -c "
          import tomllib; from pathlib import Path
          print(tomllib.loads(Path('pyproject.toml').read_text())['project']['version'])
          ")
          tag="v${version}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "${tag}"; then
            echo "Tag ${tag} already exists"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${tag}"
            git push origin "${tag}"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: ${{ matrix.label }}
    needs: tag
    if: always() && (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: Linux
            artifact_suffix: linux-x64
          - os: windows-latest
            label: Windows
            artifact_suffix: windows-x64
          - os: macos-latest
            label: macOS
            artifact_suffix: macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Read project metadata
        shell: bash
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path('pyproject.toml').read_text())
          name = data['project']['name']
          version = data['project']['version']

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as fh:
              fh.write(f'APP_NAME={name}\n')
              fh.write(f'APP_VERSION={version}\n')
          PY

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyqt6 yt-dlp imageio-ffmpeg certifi

      - name: Build app with PyInstaller
        shell: bash
        run: pyinstaller --noconfirm --clean --onefile --name "$APP_NAME" --windowed main.py

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          artifact="dist/${APP_NAME}-${APP_VERSION}-${{ matrix.artifact_suffix }}.tar.gz"
          if [ -f "dist/${APP_NAME}" ]; then
            tar -czf "$artifact" -C dist "$APP_NAME"
          elif [ -d "dist/${APP_NAME}" ]; then
            tar -czf "$artifact" -C dist "$APP_NAME"
          else
            echo "Expected dist/${APP_NAME} to exist" >&2
            exit 1
          fi
          echo "ARTIFACT_PATH=$artifact" >> "$GITHUB_ENV"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "dist/$env:APP_NAME-$env:APP_VERSION-${{ matrix.artifact_suffix }}.zip"
          if (Test-Path "dist/$env:APP_NAME") {
            Compress-Archive -Path "dist/$env:APP_NAME" -DestinationPath $artifact -Force
          } elseif (Test-Path "dist/$env:APP_NAME.exe") {
            Compress-Archive -Path "dist/$env:APP_NAME.exe" -DestinationPath $artifact -Force
          } else {
            throw "Expected dist/$env:APP_NAME or dist/$env:APP_NAME.exe to exist"
          }
          "ARTIFACT_PATH=$artifact" >> $env:GITHUB_ENV

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          artifact="dist/${APP_NAME}-${APP_VERSION}-${{ matrix.artifact_suffix }}.zip"
          if [ -d "dist/${APP_NAME}.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "dist/${APP_NAME}.app" "$artifact"
          elif [ -d "dist/${APP_NAME}" ]; then
            ditto -c -k --keepParent "dist/${APP_NAME}" "$artifact"
          else
            echo "Expected dist/${APP_NAME}.app or dist/${APP_NAME} to exist" >&2
            exit 1
          fi
          echo "ARTIFACT_PATH=$artifact" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.APP_VERSION }}-${{ matrix.artifact_suffix }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (needs.tag.outputs.created == 'true' || startsWith(github.ref, 'refs/tags/v'))
    needs: [tag, build]
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag name
        id: resolve
        shell: bash
        run: |
          if [[ "${{ needs.tag.outputs.tag }}" != "" ]]; then
            echo "tag=${{ needs.tag.outputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show downloaded artifacts
        shell: bash
        run: |
          find release-artifacts -type f | sort

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          generate_release_notes: true
          files: release-artifacts/**/*
